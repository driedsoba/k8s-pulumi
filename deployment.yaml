apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-deployment

spec:
  replicas: 3
  selector:
    matchLabels:
      app: my-app     # find pods with this label to manage

  template:
    metadata:
      labels:
        app: my-app   # create pods with this label
    spec:
      containers:
      - name: my-container
        image: hello-k8s:v2
        ports:
        - containerPort: 3000

apiVersion: v1
kind: Service
metadata:
  name: my-service
spec:
  selector:
    app: my-app         # finds Pods with this label
  ports:
  - protocol: TCP
    port: 80            # Port the Service listens on
    targetPort: 3000    # Port on the Pod to forward to
  type: LoadBalancer    # Makes the Service accessible from outside the cluster